<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Gublu ❤️</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        color: #fff;
        overflow: hidden;
    }

    .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
    }

    h1 {
        font-size: 2.5em;
        animation: fadeIn 2s ease-in-out;
    }

    p {
        font-size: 1.3em;
        margin-top: 20px;
        line-height: 1.6;
        animation: fadeIn 3s ease-in-out;
    }

    button {
        margin-top: 30px;
        padding: 12px 25px;
        font-size: 1.2em;
        border: none;
        border-radius: 25px;
        background-color: #fff;
        color: #ff6f91;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff6f91;
        color: #fff;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Sorry Gublu 🥺❤️</h1>

    <p id="message">
        Please baby khoma kore din amay...<br><br>
        Sorry sorry sorry sorry 😔<br><br>
        R hbe na erom, please khoma kore din...<br><br>
        Amr sona cutie Gublu baby 💖<br>
        Lokkhi amr... raag koro na cutie 🥺
    </p>

    <button onclick="showLove()">Click here baby 💌</button>

    <p id="finalMessage" class="hidden">
        You mean everything to me, Gublu ❤️<br><br>
        Please forgive your kuchupu 🥺💖
    </p>
</div>

<script>
function showLove() {
    document.getElementById("finalMessage").classList.remove("hidden");
}
</script>

</body>
</html>
